<style>
  :root {
    --bg: #0A0E1A;
    --bg-elev: #111625;
    --surface: #161C2E;
    --surface-2: #1C2339;
    --border: rgba(244, 241, 234, 0.08);
    --border-strong: rgba(244, 241, 234, 0.14);
    --ink: #F4F1EA;
    --ink-2: #C6C4BD;
    --ink-3: #7E8299;
    --ink-4: #50556B;

    --gold: oklch(0.82 0.13 82);
    --gold-2: oklch(0.72 0.15 70);
    --gold-soft: oklch(0.82 0.13 82 / 0.14);

    --mk: oklch(0.72 0.13 245);
    --hs: oklch(0.70 0.15 25);
    --ak: oklch(0.72 0.14 150);
    --ep: oklch(0.70 0.14 310);
    --rest: oklch(0.78 0.10 210);
    --travel: oklch(0.68 0.02 260);

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --bounce: cubic-bezier(0.34, 1.2, 0.64, 1);

    --radius: 12px;
    --radius-lg: 20px;
    --radius-xl: 28px;

    --density: 1;
  }

  html[data-theme="light"] {
    --bg: #F5F1E8;
    --bg-elev: #FBF8F1;
    --surface: #FFFFFF;
    --surface-2: #FBF8F1;
    --border: rgba(23, 24, 33, 0.09);
    --border-strong: rgba(23, 24, 33, 0.16);
    --ink: #171821;
    --ink-2: #3A3C4B;
    --ink-3: #6B6E82;
    --ink-4: #9A9CAE;

    --gold: oklch(0.62 0.14 65);
    --gold-2: oklch(0.55 0.15 55);
    --gold-soft: oklch(0.62 0.14 65 / 0.12);

    --mk: oklch(0.55 0.15 245);
    --hs: oklch(0.55 0.18 25);
    --ak: oklch(0.50 0.14 150);
    --ep: oklch(0.50 0.16 310);
    --rest: oklch(0.58 0.12 210);
    --travel: oklch(0.52 0.02 260);

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    transition: background 0.4s var(--ease), color 0.4s var(--ease);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.035;
    mix-blend-mode: overlay;
    z-index: 1;
  }

  .display {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-variation-settings: 'opsz' 144, 'SOFT' 50;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .display-italic { font-style: italic; font-weight: 300; }
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-feature-settings: 'tnum', 'zero';
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .card-elev {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-2);
    letter-spacing: 0.04em;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s var(--ease);
  }
  .btn:hover { border-color: var(--border-strong); background: var(--surface); }
  .btn-primary {
    background: var(--gold);
    color: #1A1202;
    border-color: transparent;
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.05); }

  .page-enter { opacity: 1; }

  .cd-digit { font-variant-numeric: tabular-nums; }

  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.18s var(--ease);
    font-size: 14px;
    font-weight: 500;
    user-select: none;
    position: relative;
  }
  .sidebar-link:hover { color: var(--ink); background: var(--surface); }
  .sidebar-link.active {
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .sidebar-link .idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-4);
    width: 18px;
  }

  .ring-track { stroke: var(--border-strong); fill: none; }
  .ring-fill { stroke: var(--gold); fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s var(--ease); }

  :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  ::selection { background: var(--gold-soft); color: var(--ink); }

  .mono-tiny { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }

  .tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    border-radius: 18px;
    padding: 18px;
    width: 280px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    font-size: 13px;
    backdrop-filter: blur(20px);
  }
  .tweaks h3 { margin: 0 0 12px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; font-family: 'JetBrains Mono', monospace;}
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg button {
    flex: 1; background: transparent; border: none;
    color: var(--ink-3); padding: 6px 8px;
    font-family: inherit; font-size: 12px; border-radius: 7px;
    cursor: pointer; font-weight: 500; transition: all 0.18s var(--ease);
  }
  .seg button.on { background: var(--gold-soft); color: var(--gold); }

  .time-rail { position: relative; padding-left: 60px; }
  .time-rail::before {
    content: '';
    position: absolute;
    left: 40px; top: 12px; bottom: 12px;
    width: 1px;
    background: linear-gradient(to bottom,
      oklch(0.88 0.08 85 / 0.4) 0%,
      oklch(0.80 0.12 75 / 0.5) 20%,
      oklch(0.72 0.14 60 / 0.6) 40%,
      oklch(0.58 0.14 40 / 0.5) 65%,
      oklch(0.42 0.12 280 / 0.5) 85%,
      oklch(0.32 0.10 270 / 0.4) 100%);
  }

  .tick-state {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600;
    color: var(--ink-4);
    transition: all 0.18s var(--ease);
  }
  .tick-state:hover { border-color: var(--gold); color: var(--ink-2); }
  .tick-state.clear { background: oklch(0.72 0.14 150 / 0.2); border-color: oklch(0.72 0.14 150); color: oklch(0.86 0.14 150); }
  .tick-state.borderline { background: oklch(0.78 0.15 80 / 0.2); border-color: oklch(0.78 0.15 80); color: oklch(0.86 0.14 80); }
  .tick-state.short { background: oklch(0.65 0.18 25 / 0.2); border-color: oklch(0.65 0.18 25); color: oklch(0.80 0.16 25); }
  html[data-theme="light"] .tick-state.clear { color: oklch(0.35 0.14 150); }
  html[data-theme="light"] .tick-state.borderline { color: oklch(0.40 0.15 60); }
  html[data-theme="light"] .tick-state.short { color: oklch(0.45 0.18 25); }
</style>

const Icon = ({ name, size = 16, style = {}, stroke = 1.5 }) => {
  const s = size;
  const common = {
    width: s, height: s, viewBox: '0 0 24 24',
    fill: 'none', stroke: 'currentColor',
    strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round',
    style: { flexShrink: 0, ...style },
  };
  switch (name) {
    case 'home':         return <svg {...common}><path d="M3 11l9-8 9 8v10a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1V11z"/></svg>;
    case 'user-plus':    return <svg {...common}><circle cx="9" cy="8" r="4"/><path d="M3 21v-1a6 6 0 016-6h0a6 6 0 016 6v1"/><path d="M19 8v6M16 11h6"/></svg>;
    case 'calendar':     return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>;
    case 'map':          return <svg {...common}><path d="M9 5L3 7v14l6-2 6 2 6-2V5l-6 2-6-2z"/><path d="M9 5v14M15 7v14"/></svg>;
    case 'fork':         return <svg {...common}><path d="M7 3v6a3 3 0 006 0V3M10 3v18M17 3c-1 1-2 3-2 5 0 4 2 5 2 5v8"/></svg>;
    case 'check':        return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 12l3 3 5-6"/></svg>;
    case 'bag':          return <svg {...common}><path d="M6 7h12l-1 13a1 1 0 01-1 1H8a1 1 0 01-1-1L6 7z"/><path d="M9 7V5a3 3 0 016 0v2"/></svg>;
    case 'sun':          return <svg {...common}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;

    case 'cloud':        return <svg {...common}><path d="M17 18a5 5 0 000-10 6 6 0 00-11.5 1A4 4 0 006 18h11z"/></svg>;

    case 'chevron-down': return <svg {...common}><path d="M6 9l6 6 6-6"/></svg>;

    case 'arrow-right':  return <svg {...common}><path d="M5 12h14M13 6l6 6-6 6"/></svg>;

function useCountdown(target) {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const ms = Math.max(0, target.getTime() - now.getTime());
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms / 3600000) % 24);
  const m = Math.floor((ms / 60000) % 60);
  const s = Math.floor((ms / 1000) % 60);
  return { d, h, m, s };
}

function HeightMatrix({ park }) {
  const [grid, setGrid] = React.useState(() => {
    try {
      const saved = localStorage.getItem(`heights-${park.id}`);
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    const g = {};
    park.rides.forEach((r, ri) => {
      HEIGHT_KIDS.forEach(k => {
        if (r.height === 'any') g[`${ri}-${k.name}`] = 'clear';
        else if (k.height >= r.height + 2) g[`${ri}-${k.name}`] = 'clear';
        else if (k.height >= r.height) g[`${ri}-${k.name}`] = 'borderline';
        else g[`${ri}-${k.name}`] = 'short';
      });
    });
    return g;
  });

  React.useEffect(() => {
    try { localStorage.setItem(`heights-${park.id}`, JSON.stringify(grid)); } catch (e) {}
  }, [grid, park.id]);

  const cycle = (key) => {
    const states = ['short', 'borderline', 'clear', 'unset'];
    const cur = grid[key] || 'unset';
    const idx = states.indexOf(cur);
    const next = states[(idx + 1) % states.length];
    setGrid({ ...grid, [key]: next === 'unset' ? null : next });
  };

  const stateMark = { clear: '✓', borderline: '±', short: '×' };

  return (
    <div className="card" style={{ padding: 24, overflow: 'auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div className="mono-tiny">Height tracker · {park.name}</div>
          <div className="display" style={{ fontSize: 24, marginTop: 6 }}>Who clears what.</div>
          <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 4 }}>Click any cell to cycle states. Saved on this device.</div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <span className="chip" style={{ borderColor: 'oklch(0.72 0.14 150)' }}><span style={{ color: 'oklch(0.80 0.14 150)' }}>✓</span> Clears</span>
          <span className="chip" style={{ borderColor: 'oklch(0.78 0.15 80)' }}><span style={{ color: 'oklch(0.82 0.14 80)' }}>±</span> Borderline</span>
          <span className="chip" style={{ borderColor: 'oklch(0.65 0.18 25)' }}><span style={{ color: 'oklch(0.75 0.16 25)' }}>×</span> Too short</span>
        </div>
      </div>

      <table style={{ width: '100%', borderCollapse: 'separate', borderSpacing: 0 }}>
        <thead>
          <tr>
            <th style={{ textAlign: 'left', padding: '8px 12px', fontSize: 11, color: 'var(--ink-3)', fontFamily: 'JetBrains Mono', fontWeight: 500, letterSpacing: '0.1em', borderBottom: '1px solid var(--border)' }}>RIDE</th>
            <th style={{ textAlign: 'right', padding: '8px 12px', fontSize: 11, color: 'var(--ink-3)', fontFamily: 'JetBrains Mono', fontWeight: 500, letterSpacing: '0.1em', borderBottom: '1px solid var(--border)', width: 64 }}>MIN</th>
            {HEIGHT_KIDS.map(k => (
              <th key={k.name} style={{ padding: '8px 4px', fontSize: 11, color: 'var(--ink-2)', fontFamily: 'Inter Tight', fontWeight: 500, borderBottom: '1px solid var(--border)', width: 70 }}>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: k.color }} />
                  {k.name}
                  <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>{k.height}"</span>
                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {park.rides.map((r, ri) => (
            <tr key={ri}>
              <td style={{ padding: '12px 12px', fontSize: 14, borderBottom: '1px solid var(--border)' }}>{r.name}</td>
              <td style={{ padding: '12px 12px', fontSize: 13, textAlign: 'right', color: 'var(--ink-3)', borderBottom: '1px solid var(--border)', fontFamily: 'JetBrains Mono' }}>
                {r.height === 'any' ? '—' : `${r.height}"`}
              </td>
              {HEIGHT_KIDS.map(k => {
                const key = `${ri}-${k.name}`;
                const s = grid[key];
                return (
                  <td key={k.name} style={{ padding: 6, textAlign: 'center', borderBottom: '1px solid var(--border)' }}>
                    <button className={`tick-state ${s || ''}`} onClick={() => cycle(key)}>
                      {s ? stateMark[s] : ''}
                    </button>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

const TWEAK_DEFAULTS = { theme: 'dark', density: 'cozy', accent: 82, heroVariant: 'countdown' };

function App() {
  const [page, setPage] = React.useState(() => {
    try { return localStorage.getItem('page') || 'overview'; } catch (e) { return 'overview'; }
  });
  const [theme, setTheme] = React.useState(() => {
    try { return localStorage.getItem('theme') || TWEAK_DEFAULTS.theme; } catch (e) { return TWEAK_DEFAULTS.theme; }
  });
  const [density, setDensity] = React.useState(TWEAK_DEFAULTS.density);
  const [accent, setAccent] = React.useState(TWEAK_DEFAULTS.accent);
  const [heroVariant, setHeroVariant] = React.useState(TWEAK_DEFAULTS.heroVariant);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => { try { localStorage.setItem('page', page); } catch(e){} }, [page]);
  React.useEffect(() => { try { localStorage.setItem('theme', theme); } catch(e){} }, [theme]);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--gold', `oklch(0.82 0.13 ${accent})`);
    document.documentElement.style.setProperty('--gold-2', `oklch(0.72 0.15 ${accent - 12})`);
    document.documentElement.style.setProperty('--gold-soft', `oklch(0.82 0.13 ${accent} / 0.14)`);
  }, [accent]);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  let pageEl;
  if (page === 'overview') pageEl = <Overview heroVariant={heroVariant} onNav={setPage} />;
  else if (page === 'account') pageEl = <AccountPage />;
  else if (page === 'calendar') pageEl = <CalendarPage />;
  else if (page === 'parks') pageEl = <ParksPage />;
  else if (page === 'dining') pageEl = <DiningPage />;
  else if (page === 'checklist') pageEl = <ChecklistPage />;
  else if (page === 'packing') pageEl = <PackingPage />;

  return (
    <Shell
      activeId={page} onNav={setPage}
      theme={theme} setTheme={setTheme}
      density={density} setDensity={setDensity}
      accent={accent} setAccent={setAccent}
      heroVariant={heroVariant} setHeroVariant={setHeroVariant}
      editMode={editMode}
    >
      {pageEl}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
